- id: N3
  kind: decision
  text: Changed ExportOptions blockOutputs defaults to stable Editor+Block keyed selections.
    clone/sanitize/defaults now derive allowed selections from the NaverBlog editor-block
    registry, persisted settings sanitize to that key set, HTTP defaults/settings/export
    continue through clone/sanitize with the new payload, and single-post CLI validation
    rejects block-type-only keys while validating variants and params from the registry.
    Updated focused export-options, HTTP, and CLI tests for the breaking contract.
  why: Task completed after required mechanical and semantic verification records.
  affects:
