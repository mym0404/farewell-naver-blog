name: required-checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  validate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read Playwright version
        id: playwright-version
        run: |
          version=$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('node_modules/playwright/package.json', 'utf8')); console.log(pkg.version)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Restore Playwright browser cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps --only-shell chromium

      - name: Run local checks
        run: pnpm check:local

      - name: Run UI smoke
        timeout-minutes: 10
        run: pnpm smoke:ui

      - name: Run parser block coverage gate
        run: pnpm test:parser-blocks

      - name: Run coverage gate
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          fail_ci_if_error: true
