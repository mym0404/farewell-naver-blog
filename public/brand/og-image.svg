      <stop offset="1" stop-color="#07110D" />
    </radialGradient>
    <radialGradient id="bg-right" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1028 112) rotate(122.218) scale(370.991 500.606)">
      <stop stop-color="#173728" stop-opacity="0.92" />
      <stop offset="1" stop-color="#08100D" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="icon-face" x1="124" y1="118" x2="244" y2="244" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1AE072" />
      <stop offset="1" stop-color="#04BA55" />
    </linearGradient>
    <linearGradient id="icon-glow" x1="120" y1="124" x2="228" y2="232" gradientUnits="userSpaceOnUse">
